spring:
  application:
    name: petshop-server

  datasource:
    url: jdbc:postgresql://${DB_HOST:pg-3da83de9-keya.h.aivencloud.com}:${DB_PORT:15474}/${DB_NAME:defaultdb}?currentSchema=petshop&sslmode=${DB_SSL_MODE:require}
    username: ${DB_USERNAME:avnadmin}
    password: ${DB_PASSWORD:AVNS_jl1LCHVSQuJzsy5eRcz}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_schema: petshop
        format_sql: true
    defer-datasource-initialization: true
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Europe/Istanbul

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:info@patilya.com.tr}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true


server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# JWT
jwt:
  secret: ${JWT_SECRET:patilya-super-secret-key-minimum-256-bits-for-HS256-algorithm-change-in-production}
  access-token-expiration-ms: 900000        # 15 dakika
  refresh-token-expiration-ms: 604800000    # 7 gün

# Uygulama ayarları
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail-from: ${MAIL_FROM:info@patilya.com.tr}
  name: ${APP_NAME:PatilyaPetshop}
  name-part1: ${APP_NAME_PART1:Patilya}
  name-part2: ${APP_NAME_PART2:Petshop}
  domain: ${APP_DOMAIN:patilyapetshop.com.tr}
  year: ${APP_YEAR:2025}
  telegram:
    chat-id: ${TELEGRAM_CHAT_ID:}
    api-key: ${TELEGRAM_API_KEY:}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

logging:
  level:
    com.patilya: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
