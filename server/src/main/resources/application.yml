server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  tomcat:
    max-http-form-post-size: 262144   # 256 KB — SaaS payload'ları küçük
    connection-timeout: 20s
    max-keep-alive-requests: 100
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,text/plain,text/html,text/css,application/javascript
    min-response-size: 1024
  error:
    include-stacktrace: never
    include-message: always

spring:
  application:
    name: petshop-server
  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: jdbc:postgresql://${DB_HOST:pg-3da83de9-keya.h.aivencloud.com}:${DB_PORT:15474}/${DB_NAME:defaultdb}?currentSchema=petshop&sslmode=${DB_SSL_MODE:require}
    username: ${DB_USERNAME:avnadmin}
    password: ${DB_PASSWORD:AVNS_jl1LCHVSQuJzsy5eRcz}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_schema: petshop
        format_sql: true
    defer-datasource-initialization: true
    open-in-view: false

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    schemas: petshop
    default-schema: petshop
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Europe/Istanbul

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# (server config'i dosyanın başında — port + tomcat tuning birlikte)

# JWT
jwt:
  secret: ${JWT_SECRET:petshop-super-secret-key-minimum-256-bits-for-HS256-algorithm-change-in-production}
  access-token-expiration-ms: 900000        # 15 dakika
  refresh-token-expiration-ms: 604800000    # 7 gün

# Uygulama ayarları
app:
  url: ${APP_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail-from: ${MAIL_FROM:info@petshop.com.tr}
  # Marka adı, alan adı ve yıl artık DB'den (site_settings) okunuyor — admin panelinden yönetilir
  telegram:
    chat-id: ${TELEGRAM_CHAT_ID:}
    api-key: ${TELEGRAM_API_KEY:}
  brevo-api-key: ${BREVO_API_KEY:}

iyzico:
  api-key: ${IYZICO_API_KEY:}
  secret-key: ${IYZICO_SECRET_KEY:}
  base-url: ${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}

parasut:
  enabled: ${PARASUT_ENABLED:false}
  client-id: ${PARASUT_CLIENT_ID:}
  client-secret: ${PARASUT_CLIENT_SECRET:}
  username: ${PARASUT_USERNAME:}
  password: ${PARASUT_PASSWORD:}
  company-id: ${PARASUT_COMPANY_ID:}
  base-url: ${PARASUT_BASE_URL:https://api.parasut.com/v4}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

features:
  legacy-ecommerce: ${LEGACY_ECOMMERCE:false}
  # SaaS register-company sonrası e-posta doğrulama zorunlu mu?
  # false: admin direkt giriş yapar (frictionless)
  # true:  6 haneli kod gönderilir, /verify-email gerekir
  saas-email-verification: ${SAAS_EMAIL_VERIFICATION:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: never  # production'da detay sızdırma
      probes:
        enabled: true       # /actuator/health/liveness + /actuator/health/readiness
  health:
    db:
      enabled: true
  info:
    env:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 100ms,500ms,1s

info:
  app:
    name: PetToptan SaaS
    version: '@project.version@'

logging:
  level:
    com.petshop: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
