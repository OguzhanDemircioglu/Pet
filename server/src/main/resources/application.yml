spring:
  application:
    name: petshop-server

  datasource:
    url: jdbc:postgresql://${DB_HOST:pg-3da83de9-keya.h.aivencloud.com}:${DB_PORT:15474}/${DB_NAME:defaultdb}?currentSchema=petshop&sslmode=${DB_SSL_MODE:require}
    username: ${DB_USERNAME:avnadmin}
    password: ${DB_PASSWORD:AVNS_jl1LCHVSQuJzsy5eRcz}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_schema: petshop
        format_sql: true
    defer-datasource-initialization: true
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Europe/Istanbul

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# JWT
jwt:
  secret: ${JWT_SECRET:petshop-super-secret-key-minimum-256-bits-for-HS256-algorithm-change-in-production}
  access-token-expiration-ms: 900000        # 15 dakika
  refresh-token-expiration-ms: 604800000    # 7 gün

# Uygulama ayarları
app:
  url: ${APP_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail-from: ${MAIL_FROM:info@petshop.com.tr}
  # Marka adı, alan adı ve yıl artık DB'den (site_settings) okunuyor — admin panelinden yönetilir
  telegram:
    chat-id: ${TELEGRAM_CHAT_ID:}
    api-key: ${TELEGRAM_API_KEY:}
  brevo-api-key: ${BREVO_API_KEY:}

iyzico:
  api-key: ${IYZICO_API_KEY:}
  secret-key: ${IYZICO_SECRET_KEY:}
  base-url: ${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

logging:
  level:
    com.petshop: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
