services:

  # ── Backend (Spring Boot) ────────────────────────────────────────────────────
  - type: web
    name: petshop-backend
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    plan: starter          # $7/mo — always on, persistent disk desteği var
    healthCheckPath: /public/health
    disk:
      name: petshop-uploads
      mountPath: /uploads
      sizeGB: 1
    envVars:
      # PostgreSQL (Aiven) — Render dashboard'dan manuel gir
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

      # JWT — Render otomatik üretir
      - key: JWT_SECRET
        generateValue: true

      # Frontend URL — CORS için (petshop-frontend'in URL'si otomatik gelir)
      - key: FRONTEND_URL
        fromService:
          type: static
          name: petshop-frontend
          property: deployedURL

      # Mail (Brevo) — dashboard'dan gir
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false

      # Telegram — dashboard'dan gir
      - key: TELEGRAM_API_KEY
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

  # ── Frontend (React/Vite) ────────────────────────────────────────────────────
  - type: static
    name: petshop-frontend
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Backend URL — petshop-backend'in URL'si otomatik gelir
      - key: VITE_API_URL
        fromService:
          type: web
          name: petshop-backend
          property: deployedURL
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      # React Router için — tüm path'leri index.html'e yönlendir
      - type: rewrite
        source: /*
        destination: /index.html
