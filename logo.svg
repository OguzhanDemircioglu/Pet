<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">

  <!-- Örgü halka: kırmızı boncuklar (#dc2626 = --primary) -->
  <circle cx="100" cy="100" r="87" fill="none"
          stroke="#dc2626" stroke-width="18"
          stroke-dasharray="15 15" stroke-linecap="round"
          stroke-dashoffset="0"/>

  <!-- Örgü halka: açık mavi boncuklar (#38bdf8 = --accent) -->
  <circle cx="100" cy="100" r="87" fill="none"
          stroke="#38bdf8" stroke-width="18"
          stroke-dasharray="15 15" stroke-linecap="round"
          stroke-dashoffset="15"/>

  <!-- Harita pini gölgesi -->
  <path d="M100 40 C77 40 58 59 58 82 C58 113 100 150 100 150
           C100 150 142 113 142 82 C142 59 123 40 100 40Z"
        fill="#b91c1c" opacity="0.2" transform="translate(2,3)"/>

  <!-- Harita pini (#dc2626 = --primary) -->
  <path d="M100 38 C77 38 57 58 57 81 C57 112 100 148 100 148
           C100 148 143 112 143 81 C143 58 123 38 100 38Z"
        fill="#dc2626"/>

  <!-- Pati izi: beyaz kontur (derinlik için) -->
  <ellipse cx="100" cy="95"  rx="14"  ry="12"  fill="#ffffff"/>
  <ellipse cx="80"  cy="75"  rx="10"  ry="9"   fill="#ffffff"/>
  <ellipse cx="100" cy="70"  rx="10"  ry="9"   fill="#ffffff"/>
  <ellipse cx="120" cy="75"  rx="10"  ry="9"   fill="#ffffff"/>

  <!-- Pati izi: açık mavi (#38bdf8 = --accent) -->
  <ellipse cx="100" cy="95"  rx="11"  ry="9.5" fill="#38bdf8"/>
  <ellipse cx="80"  cy="75"  rx="7.5" ry="6.5" fill="#38bdf8"/>
  <ellipse cx="100" cy="70"  rx="7.5" ry="6.5" fill="#38bdf8"/>
  <ellipse cx="120" cy="75"  rx="7.5" ry="6.5" fill="#38bdf8"/>

</svg>
